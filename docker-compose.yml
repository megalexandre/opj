services:
  db:
    image: postgis/postgis:17-3.6-alpine
    environment:
      POSTGRES_USER: API_USER
      POSTGRES_PASSWORD: API_PASSWORD
      POSTGRES_DB: API_DEVELOPMENT
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U API_USER -d API_DEVELOPMENT"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: test
      MINIO_ROOT_PASSWORD: testtest
    command: server /data --console-address ":9001"
    volumes:
      - "./volume:/data"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    ports:
      - "3000:80"
    environment:
      DATABASE_URL: "postgis://API_USER:API_PASSWORD@db:5432/API_DEVELOPMENT"
      AWS_S3_ENDPOINT: "http://minio:9000"
      AWS_S3_ACCESS_KEY: "test"
      AWS_S3_SECRET_KEY: "testtest"
      AWS_S3_BUCKET_NAME: "opj-uploads"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
