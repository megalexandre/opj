---
openapi: 3.0.1
info:
  title: OPJ API
  version: v1
servers:
- url: http://localhost:3000
  description: Desenvolvimento
security:
- bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Address:
      type: object
      properties:
        id:
          type: string
          format: uuid
        link:
          type: string
          nullable: true
        place:
          type: string
          nullable: true
        cep:
          type: string
          nullable: true
        number:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        complement:
          type: string
          nullable: true
        neighborhood:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        tax_id:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          "$ref": "#/components/schemas/Address"
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
    Concessionaire:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        acronym:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        active:
          type: boolean
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
    Coordinates:
      type: object
      nullable: true
      properties:
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
      required:
      - latitude
      - longitude
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid
        address_id:
          type: string
          format: uuid
          nullable: true
        utility_company:
          type: string
        utility_protocol:
          type: string
        customer_class:
          type: string
        integrator:
          type: string
        modality:
          type: string
        framework:
          type: string
        status:
          type: string
          nullable: true
        amount:
          type: string
          nullable: true
        dc_protection:
          type: string
          nullable: true
        system_power:
          type: number
          format: float
          nullable: true
        unit_control:
          type: string
        description:
          type: string
          nullable: true
        project_type:
          type: string
        fast_track:
          type: boolean
        coordinates:
          "$ref": "#/components/schemas/Coordinates"
        services_names:
          type: array
          items:
            type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - client_id
      - utility_company
      - utility_protocol
      - customer_class
      - integrator
      - modality
      - framework
      - unit_control
      - project_type
      - fast_track
    Upload:
      type: object
      properties:
        id:
          type: string
          format: uuid
        item_id:
          type: string
          format: uuid
        filename:
          type: string
        url_s3:
          type: string
        size:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - item_id
      - filename
      - url_s3
      - size
    Page:
      type: object
      properties:
        content:
          type: array
          items:
            type: object
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer
        numberOfElements:
          type: integer
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean
    Error:
      type: object
      properties:
        message:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        profile:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - name
      - email
      - profile
    AuthToken:
      type: object
      properties:
        token:
          type: string
        user:
          "$ref": "#/components/schemas/User"
      required:
      - token
      - user
paths:
  "/addresses":
    get:
      summary: Lista todos os endereços
      tags:
      - Addresses
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: lista de endereços
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/Address"
    post:
      summary: Cria um endereço
      tags:
      - Addresses
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '201':
          description: endereço criado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Address"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                link:
                  type: string
                place:
                  type: string
                cep:
                  type: string
                number:
                  type: string
                address:
                  type: string
                complement:
                  type: string
                neighborhood:
                  type: string
                city:
                  type: string
                state:
                  type: string
  "/addresses/paginate":
    get:
      summary: Lista endereços paginados
      tags:
      - Addresses
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Página (começa em 1)
        schema:
          type: integer
      - name: items
        in: query
        required: false
        description: Itens por página
        schema:
          type: integer
      responses:
        '200':
          description: página de endereços
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/Page"
                - type: object
                  properties:
                    content:
                      type: array
                      items:
                        "$ref": "#/components/schemas/Address"
  "/addresses/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    get:
      summary: Busca um endereço
      tags:
      - Addresses
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: endereço encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Address"
        '404':
          description: não encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Atualiza um endereço
      tags:
      - Addresses
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: endereço atualizado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Address"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                link:
                  type: string
                place:
                  type: string
                cep:
                  type: string
                number:
                  type: string
                address:
                  type: string
                complement:
                  type: string
                neighborhood:
                  type: string
                city:
                  type: string
                state:
                  type: string
    delete:
      summary: Remove um endereço
      tags:
      - Addresses
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '204':
          description: removido com sucesso
        '404':
          description: não encontrado
  "/auth/register":
    post:
      summary: Registra um novo usuário
      tags:
      - Auth
      security: []
      parameters: []
      responses:
        '201':
          description: usuário criado e token retornado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AuthToken"
        '422':
          description: dados inválidos
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - email
              - password
              properties:
                name:
                  type: string
                email:
                  type: string
                profile:
                  type: string
                password:
                  type: string
  "/auth/login":
    post:
      summary: Autentica um usuário
      tags:
      - Auth
      security: []
      parameters: []
      responses:
        '200':
          description: autenticado com sucesso
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AuthToken"
        '401':
          description: credenciais inválidas
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              properties:
                email:
                  type: string
                password:
                  type: string
  "/auth/me":
    get:
      summary: Retorna o usuário autenticado
      tags:
      - Auth
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: usuário retornado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/User"
        '401':
          description: token ausente ou inválido
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/concessionaires":
    get:
      summary: Lista todas as concessionárias
      tags:
      - Concessionaires
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: lista de concessionárias
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/Concessionaire"
    post:
      summary: Cria uma concessionária
      tags:
      - Concessionaires
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '201':
          description: concessionária criada
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Concessionaire"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                acronym:
                  type: string
                code:
                  type: string
                region:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                active:
                  type: boolean
  "/concessionaires/paginate":
    get:
      summary: Lista concessionárias paginadas
      tags:
      - Concessionaires
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Página (começa em 1)
        schema:
          type: integer
      - name: items
        in: query
        required: false
        description: Itens por página
        schema:
          type: integer
      responses:
        '200':
          description: página de concessionárias
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/Page"
                - type: object
                  properties:
                    content:
                      type: array
                      items:
                        "$ref": "#/components/schemas/Concessionaire"
  "/concessionaires/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    get:
      summary: Busca uma concessionária
      tags:
      - Concessionaires
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: concessionária encontrada
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Concessionaire"
        '404':
          description: não encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Atualiza uma concessionária
      tags:
      - Concessionaires
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: concessionária atualizada
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Concessionaire"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                acronym:
                  type: string
                code:
                  type: string
                region:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                active:
                  type: boolean
    delete:
      summary: Remove uma concessionária
      tags:
      - Concessionaires
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '204':
          description: removida com sucesso
        '404':
          description: não encontrado
  "/customers":
    get:
      summary: Lista todos os clientes
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: lista de clientes
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/Customer"
    post:
      summary: Cria um cliente
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '201':
          description: cliente criado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Customer"
        '422':
          description: e-mail ou CPF/CNPJ já cadastrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                tax_id:
                  type: string
                phone:
                  type: string
                address_id:
                  type: string
                  format: uuid
                  description: Vincular endereço existente
                address_attributes:
                  type: object
                  description: Criar endereço junto com o cliente
                  properties:
                    place:
                      type: string
                    cep:
                      type: string
                    number:
                      type: string
                    city:
                      type: string
                    state:
                      type: string
  "/customers/paginate":
    get:
      summary: Lista clientes paginados
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Página (começa em 1)
        schema:
          type: integer
      - name: items
        in: query
        required: false
        description: Itens por página
        schema:
          type: integer
      responses:
        '200':
          description: página de clientes
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/Page"
                - type: object
                  properties:
                    content:
                      type: array
                      items:
                        "$ref": "#/components/schemas/Customer"
  "/customers/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    get:
      summary: Busca um cliente
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: cliente encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Customer"
        '404':
          description: não encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Atualiza um cliente
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: cliente atualizado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Customer"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                tax_id:
                  type: string
                phone:
                  type: string
    delete:
      summary: Remove um cliente
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '204':
          description: removido com sucesso
        '404':
          description: não encontrado
  "/projects":
    get:
      summary: Lista todos os projetos
      tags:
      - Projects
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: lista de projetos
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/Project"
    post:
      summary: Cria um projeto
      tags:
      - Projects
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '201':
          description: projeto criado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Project"
        '422':
          description: cliente não encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - client_id
              - utility_company
              - utility_protocol
              - customer_class
              - integrator
              - modality
              - framework
              - unit_control
              - project_type
              properties:
                client_id:
                  type: string
                  format: uuid
                address_id:
                  type: string
                  format: uuid
                  nullable: true
                utility_company:
                  type: string
                utility_protocol:
                  type: string
                customer_class:
                  type: string
                integrator:
                  type: string
                modality:
                  type: string
                framework:
                  type: string
                status:
                  type: string
                amount:
                  type: number
                dc_protection:
                  type: string
                system_power:
                  type: number
                unit_control:
                  type: string
                description:
                  type: string
                project_type:
                  type: string
                fast_track:
                  type: boolean
                coordinates:
                  type: string
                  description: 'WKT — ex: "POINT(-43.9 -19.9)"'
                services_names:
                  type: array
                  items:
                    type: string
  "/projects/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    get:
      summary: Busca um projeto
      tags:
      - Projects
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: projeto encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Project"
        '404':
          description: não encontrado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Atualiza um projeto
      tags:
      - Projects
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: projeto atualizado
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Project"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                description:
                  type: string
                fast_track:
                  type: boolean
                system_power:
                  type: number
    delete:
      summary: Remove um projeto
      tags:
      - Projects
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '204':
          description: removido com sucesso
        '404':
          description: não encontrado
  "/uploads":
    post:
      summary: Faz upload de arquivos vinculados a um item
      tags:
      - Uploads
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '201':
          description: arquivos enviados com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/Upload"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: string
        required: true
        description: ID do item ao qual os arquivos pertencem
    get:
      summary: Lista arquivos de um item
      tags:
      - Uploads
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
